<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PM Metrics Tree{% endblock %}</title>
  <meta name="description" content="Interactive metrics tree for Product Managers — explore KPIs across Growth, Activation, Retention, Engagement, Revenue, Satisfaction, and Quality." />
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">🌳</span>
        <span class="logo-text">PM <span class="logo-accent">Metrics Tree</span></span>
      </a>
      <nav class="header-nav">
        <a href="/" class="nav-link active">Interactive Tree</a>
        <a href="/admin/" class="nav-link nav-link--admin">Admin</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
